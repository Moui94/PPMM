<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Produktionsmonitoring</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body style="background:#f4f6f9;">

<!-- NAVBAR -->
<div id="app-navbar"
     style="display:none !important; background:#212529; color:#fff;
            height:48px; padding:0 16px;
            display:flex !important; align-items:center;
            flex-wrap:nowrap; gap:12px; position:sticky; top:0; z-index:1000;">

  <!-- Logo -->
  <a href="#" onclick="navigate('dashboard');return false;"
     style="color:#fff; text-decoration:none; font-weight:700; white-space:nowrap;
            font-size:1rem;">
    <i class="bi bi-activity me-2"></i>Produktionsmonitoring
  </a>

  <!-- Spacer -->
  <div style="flex:1;"></div>

  <!-- Uhr -->
  <small id="clock" style="color:#adb5bd; white-space:nowrap;"></small>

  <!-- Benutzer -->
  <span style="white-space:nowrap; font-size:.875rem;">
    <i class="bi bi-person-circle me-1"></i>
    <span id="nav-username"></span>
    <span id="nav-rolle" class="badge bg-secondary ms-1"></span>
  </span>

  <!-- Logout -->
  <button class="btn btn-sm btn-outline-secondary" onclick="authLogout()"
          style="white-space:nowrap;">Logout</button>
</div>


<!-- LAYOUT -->
<div class="d-flex" id="app-wrapper"
     style="display:none !important; min-height:calc(100vh - 52px);">

  <!-- Sidebar -->
  <div class="d-flex flex-column p-2" id="app-sidebar"
       style="width:220px; min-width:220px; background:#212529;">
    <div class="text-white-50 small px-2 mt-2 mb-1">Aufträge</div>
    <a href="#" class="nav-link text-white px-2 py-1 rounded"
       onclick="navigate('dashboard');return false;">
      <i class="bi bi-grid-3x3-gap me-2"></i>Übersicht</a>
    <a href="#" class="nav-link text-white px-2 py-1 rounded pl-only"
       onclick="navigate('order-new');return false;">
      <i class="bi bi-plus-circle me-2"></i>Neuer Auftrag</a>

    <div class="text-white-50 small px-2 mt-3 mb-1">Fräsplanung</div>
    <a href="#" class="nav-link text-white px-2 py-1 rounded"
       onclick="navigate('schedule',{ag:1});return false;">
      <i class="bi bi-diagram-3 me-2"></i>Dashboard AG01</a>
    <a href="#" class="nav-link text-white px-2 py-1 rounded"
       onclick="navigate('schedule',{ag:2});return false;">
      <i class="bi bi-diagram-3 me-2"></i>Dashboard AG02</a>
    <a href="#" class="nav-link text-white px-2 py-1 rounded"
       onclick="navigate('schedule',{ag:3});return false;">
      <i class="bi bi-diagram-3 me-2"></i>Dashboard AG03</a>

    <div class="text-white-50 small px-2 mt-3 mb-1">Qualität</div>
    <a href="#" class="nav-link text-white px-2 py-1 rounded"
       onclick="navigate('quality');return false;">
      <i class="bi bi-shield-check me-2"></i>Qualitäts-Dashboard</a>
    <a href="#" class="nav-link text-white px-2 py-1 rounded"
       onclick="navigate('catalog');return false;">
      <i class="bi bi-journal-text me-2"></i>Fehlerkatalog</a>

    <div class="text-white-50 small px-2 mt-3 mb-1">Export</div>
    <a href="/api/export/full" class="nav-link text-white px-2 py-1 rounded" target="_blank">
      <i class="bi bi-file-earmark-excel me-2"></i>Excel Export</a>

    <div class="text-white-50 small px-2 mt-3 mb-1 admin-only">Administration</div>
    <a href="#" class="nav-link text-white px-2 py-1 rounded admin-only"
       onclick="navigate('users');return false;">
      <i class="bi bi-people me-2"></i>Benutzer</a>
  </div>

  <!-- Content -->
  <div class="flex-grow-1 p-3" style="min-width:0;" id="app-content"></div>
</div>

<!-- LOGIN -->
<div id="login-page" style="display:none !important;">
  <div class="row justify-content-center" style="margin-top:10vh;">
    <div class="col-sm-10 col-md-6 col-lg-4">
      <div class="card shadow-sm p-4">
        <h4 class="fw-bold mb-4 text-center">
          <i class="bi bi-activity text-primary me-2"></i>Produktionsmonitoring
        </h4>
        <div id="login-error" class="alert alert-danger py-2 d-none"></div>
        <form id="login-form">
          <div class="mb-3">
            <label class="form-label fw-bold">Benutzername</label>
            <input type="text" id="login-username" class="form-control"
                   autocomplete="username">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Passwort</label>
            <input type="password" id="login-password" class="form-control"
                   autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary w-100" id="login-btn">
            <i class="bi bi-box-arrow-in-right me-1"></i>Anmelden
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/dashboard.js"></script>
<script src="/js/order.js"></script>
<script src="/js/operations.js"></script>
<script src="/js/schedule.js"></script>
<script src="/js/quality.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
